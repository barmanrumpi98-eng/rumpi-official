<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rumpi Official Website</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #fff0f5;
}

/* Header */
header {
    background: #ff4d6d;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
}

/* Navbar */
nav {
    display: flex;
    justify-content: center;
    background: #333;
}

nav a {
    color: white;
    padding: 15px 20px;
    text-decoration: none;
}

nav a:hover {
    background: #ff4d6d;
}

/* Hero Section */
.hero {
    height: 90vh;
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    url('https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e');
    background-size: cover;
    background-position: center;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.hero h1 {
    font-size: 50px;
}

.hero p {
    margin: 10px 0;
    font-size: 20px;
}

.btn {
    margin-top: 20px;
    padding: 10px 20px;
    background: #ff4d6d;
    color: white;
    border: none;
    cursor: pointer;
}

/* Sections */
.section {
    padding: 50px;
    text-align: center;
}

.section h2 {
    margin-bottom: 20px;
}

/* Gallery */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.gallery img {
    width: 250px;
    margin: 10px;
    border-radius: 10px;
}

/* Contact Form */
form {
    max-width: 400px;
    margin: auto;
}

input, textarea {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
}

button {
    background: #ff4d6d;
    color: white;
    padding: 10px;
    border: none;
    width: 100%;
}

/* Footer */
footer {
    background: #222;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>

</head>

<body>

<header>
🌸 Rumpi Official Website 🌸
</header>

<nav>
<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</nav>

<!-- Hero -->
<section class="hero" id="home">
<h1>Welcome 💖</h1>
<p>It's My Official Website</p>
<button class="btn">Follow Me</button>
</section>

<!-- About -->
<section class="section" id="about">
<h2>About Me</h2>
<p>Hi, I'm Rumpi 💕  
I love sharing my life moments, photos & videos.</p>
</section>

<!-- Gallery -->
<section class="section" id="gallery">
<h2>My Gallery 📸</h2>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330">
<img src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d">
<img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1">
</div>
</section>

<!-- Contact -->
<section class="section" id="contact">
<h2>Contact Me 📩</h2>
<form>
<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>
<textarea placeholder="Your Message"></textarea>
<button type="submit">Send Message</button>
</form>
</section>

<footer>
© 2026 Rumpi Official | All Rights Reserved 💖
</footer>

</body>
</html>
