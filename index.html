<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rumpi Official Website</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #fff0f5;
}

/* Header */
header {
    background: #ff4d6d;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
}

/* Navbar */
nav {
    display: flex;
    justify-content: center;
    background: #333;
}

nav a {
    color: white;
    padding: 15px 20px;
    text-decoration: none;
}

nav a:hover {
    background: #ff4d6d;
}

/* Hero Section */
.hero {
    height: 90vh;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url('myphoto.jpg');
    background-size: cover;
    background-position: center;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.hero h1 {
    font-size: 45px;
}

.hero p {
    font-size: 18px;
}

.btn {
    margin-top: 15px;
    padding: 10px 20px;
    background: #ff4d6d;
    color: white;
    border: none;
    cursor: pointer;
}

/* Gallery */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 30px;
}

.gallery img {
    width: 250px;
    margin: 10px;
    border-radius: 10px;
}

/* Footer */
footer {
    background: #222;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>

</head>

<body>

<header>
🌸 Rumpi Official Website 🌸
</header>

<nav>
<a href="#">Home</a>
<a href="#">Gallery</a>
</nav>

<!-- Hero Section (তোমার ছবি এখানে দেখাবে) -->
<section class="hero">
<h1>Welcome 💖</h1>
<p>It's My Official Website</p>
<button class="btn">Follow Me</button>
</section>

<!-- Gallery -->
<section class="gallery">
<img src="myphoto.jpg">
</section>

<footer>
© 2026 Rumpi Official 💖
</footer>

</body>
</html>
