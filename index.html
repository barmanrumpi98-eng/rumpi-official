<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rumpi Official Website</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#fff0f5;
}

/* Header */
header{
background:#ff4d6d;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

/* Navbar */
nav{
display:flex;
justify-content:center;
background:#333;
}

nav a{
color:white;
padding:12px;
text-decoration:none;
}

nav a:hover{
background:#ff4d6d;
}

/* Hero */
.hero{
height:90vh;
background:url("./myphoto.jpg") no-repeat center center/cover;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
text-align:center;
}

.hero h1{
font-size:35px;
}

.hero p{
font-size:16px;
}

.btn{
margin-top:10px;
padding:10px 20px;
background:#ff4d6d;
color:white;
border:none;
}

/* Gallery */
.gallery{
padding:20px;
text-align:center;
}

.gallery img{
width:90%;
max-width:300px;
margin-top:10px;
border-radius:10px;
}

/* Footer */
footer{
background:#222;
color:white;
text-align:center;
padding:10px;
}
</style>

</head>

<body>

<header>
🌸 Rumpi Official Website 🌸
</header>

<nav>
<a href="#">Home</a>
<a href="#">Gallery</a>
</nav>

<!-- Hero Section -->
<div class="hero">
<h1>Welcome 💖</h1>
<p>It's My Official Website</p>
<button class="btn">Follow Me</button>
</div>

<!-- Gallery -->
<div class="gallery">
<h2>My Photo 📸</h2>
<img src="./myphoto.jpg" alt="My Photo">
</div>

<footer>
© 2026 Rumpi Official 💖
</footer>

</body>
</html>
